name: Sync Agent Counts

on:
  schedule:
    # Runs every 40 minutes
    # Note: GitHub Actions cron minimum granularity is 5 minutes
    # and may run a few minutes late — this is expected
    - cron: "0 0 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync-agents:
    name: Sync agent_supply from BiggerPockets → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node concierge-portal/scripts/sync-agents.js

  sync-str-markets:
    name: Sync str_markets from BiggerPockets → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run STR markets sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node concierge-portal/scripts/sync-str-markets.js
