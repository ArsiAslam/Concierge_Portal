kind = "web"
previewPath = "/"
title = "Concierge Portal"
version = "1.0.0"

[[services]]
name = "web"
localPort = 3000
paths = ["/"]

[services.development]
run = "cd artifacts/concierge-portal && npm run dev -- --port 3000"

[services.production]
serveDir = ".next"

[services.production.build]
args = ["npm", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
