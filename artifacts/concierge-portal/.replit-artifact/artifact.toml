kind = "web"
previewPath = "/"
title = "Concierge Portal"
version = "1.0.0"
id = "artifacts/concierge-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24078

[services.development]
run = "pnpm --filter @workspace/concierge-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/concierge-portal", "run", "build" ]
publicDir = "artifacts/concierge-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24078"
BASE_PATH = "/"
